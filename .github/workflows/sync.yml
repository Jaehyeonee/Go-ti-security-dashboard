name: Synchronize to forked repo
on:
  push:
    branches:
      - main
jobs:
  sync:
    name: Sync forked repo
    runs-on: ubuntu-latest
    if: github.repository == 'Team-Ikujo/Go-ti-security-dashboard'

    steps:
      - name: Checkout main
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.FORKED_REPO_TOKEN }}
          fetch-depth: 0
          ref: main
          
      - name: Add remote-url
        run: |
          git remote add forked-repo https://Jaehyeonee:${{ secrets.FORKED_REPO_TOKEN }}@github.com/Jaehyeonee/Go-ti-security-dashboard
          git config user.name Jaehyeonee
          git config user.email ${{ secrets.EMAIL }}

      - name: Push changes to forked-repo
        run: |
          git push -f forked-repo main

      - name: Clean up
        run: |
          git remote remove forked-repo
